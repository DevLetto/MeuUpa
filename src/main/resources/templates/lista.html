<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Fila de Pacientes')}"></head>
<body>
<div th:replace="~{base :: navbar('lista')}"></div>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1">Fila de Pacientes</h2>
            <p class="text-muted mb-0">Acompanhe a ordem de atendimento cadastrada no sistema.</p>
        </div>
        <a th:href="@{/pacientes/formulario}" class="btn btn-primary">Cadastrar paciente</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="px-4 py-3">Nome</th>
                        <th class="px-4 py-3">CPF</th>
                        <th class="px-4 py-3">Triagem</th>
                        <th class="px-4 py-3">Horario</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="paciente : ${pacientes}">
                        <td class="px-4 py-3" th:text="${paciente.nome}"></td>
                        <td class="px-4 py-3" th:text="${paciente.cpf}"></td>
                        <td class="px-4 py-3">
                            <span th:switch="${paciente.corTriagem}">
                                <span th:case="'VERMELHO'" class="badge bg-danger">VERMELHO</span>
                                <span th:case="'LARANJA'" class="badge bg-warning text-dark">LARANJA</span>
                                <span th:case="'AMARELO'" class="badge bg-warning">AMARELO</span>
                                <span th:case="'VERDE'" class="badge bg-success">VERDE</span>
                                <span th:case="'AZUL'" class="badge bg-primary">AZUL</span>
                            </span>
                        </td>
                        <td class="px-4 py-3" th:text="${paciente.data}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(pacientes)}">
                        <td colspan="4" class="text-center text-muted py-4">Nenhum paciente cadastrado.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{base :: footer}"></div>
</body>
</html>
