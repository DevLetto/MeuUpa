<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo} + ' | Meu UPA'">Meu UPA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --upa-primary: #0d6efd;
            --upa-primary-deep: #0b4fb3;
            --upa-surface: #f4f8ff;
            --upa-ink: #10233f;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(13, 110, 253, 0.08), transparent 28%),
                linear-gradient(180deg, #f8fbff 0%, #ffffff 38%, #f4f8ff 100%);
            color: var(--upa-ink);
        }

        .brand-logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.55rem 1rem;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.18);
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.22),
                0 10px 24px rgba(7, 35, 89, 0.18);
            backdrop-filter: blur(10px);
        }

        .brand-logo {
            height: 76px;
            width: auto;
            max-width: 240px;
            object-fit: contain;
            display: block;
        }

        .navbar.navbar-dark.bg-primary {
            background: linear-gradient(135deg, var(--upa-primary-deep) 0%, var(--upa-primary) 55%, #45a3ff 100%) !important;
        }

        .navbar {
            padding-top: 0.85rem;
            padding-bottom: 0.85rem;
        }

        .navbar .nav-link {
            font-weight: 500;
            border-radius: 999px;
            padding: 0.55rem 1rem !important;
            transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .navbar .nav-link:hover,
        .navbar .nav-link:focus {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            transform: translateY(-1px);
        }

        .navbar .nav-link.active {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
        }

        footer.bg-light {
            background: linear-gradient(180deg, #ffffff 0%, #eef5ff 100%) !important;
        }

        @media (max-width: 576px) {
            .brand-logo-wrap {
                padding: 0.4rem 0.75rem;
            }

            .brand-logo {
                height: 58px;
                max-width: 180px;
            }
        }
    </style>
</head>
<body>
    <nav th:fragment="navbar(paginaAtual)" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand brand-logo-wrap" th:href="@{/pacientes/lista}">
                <img class="brand-logo"
                     th:src="@{/img/logo-upa.png}"
                     src="/img/logo-upa.png"
                     alt="Meu UPA"
                     loading="eager">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrincipal"
                aria-controls="navbarPrincipal" aria-expanded="false" aria-label="Alternar navegacao">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarPrincipal">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link"
                       th:href="@{/pacientes/lista}"
                       th:classappend="${paginaAtual == 'lista'} ? ' active' : ''">Lista</a>
                    <a class="nav-link"
                       th:href="@{/pacientes/fila}"
                       th:classappend="${paginaAtual == 'fila'} ? ' active' : ''">Fila</a>
                    <a class="nav-link"
                       th:href="@{/pacientes/formulario}"
                       th:classappend="${paginaAtual == 'cadastro'} ? ' active' : ''">Cadastrar paciente</a>
                </div>
            </div>
        </div>
    </nav>

    <footer th:fragment="footer" class="bg-light border-top mt-5 py-4">
        <div class="container text-center text-muted small">
            <p class="mb-1">Meu UPA</p>
            <p class="mb-0">Sistema de gerenciamento de fila e triagem de pacientes.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
