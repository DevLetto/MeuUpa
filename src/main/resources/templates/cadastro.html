<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Cadastrar Paciente')}"></head>
<body>
    <div th:replace="~{base :: navbar('cadastro')}"></div>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h2 class="mb-4">Cadastrar Paciente</h2>
                        <form th:action="@{/pacientes/salvar}" th:object="${paciente}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Nome</label>
                                <input type="text" th:field="*{nome}" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">CPF</label>
                                <input type="text" th:field="*{cpf}" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Data de Nascimento</label>
                                <input type="date" th:field="*{dataNascimento}" class="form-control">
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Cor da Triagem</label>
                                <select class="form-select" th:field="*{corTriagem}">
                                    <option value="VERMELHO">Vermelho</option>
                                    <option value="LARANJA">Laranja</option>
                                    <option value="AMARELO">Amarelo</option>
                                    <option value="VERDE">Verde</option>
                                    <option value="AZUL">Azul</option>
                                </select>
                            </div>
                            <div class="d-flex justify-content-end gap-2">
                                <a class="btn btn-outline-secondary" th:href="@{/pacientes/lista}">Cancelar</a>
                                <button type="submit" class="btn btn-primary">Salvar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{base :: footer}"></div>
</body>
</html>
