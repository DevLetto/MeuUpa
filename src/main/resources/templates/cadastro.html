<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>    
<body>
    <div class="container mt-5"> 
        <h2>Cadastrar Paciente</h2>

        <form th:action="@{/pacientes/salvar}" th:object="${paciente}" method="post">
            
            <div class="mb-3">
                <label>Nome</label>
                <input type="text" th:field="*{nome}" class="form-control">
            </div>

            <div class="mb-3">
                <label>CPF</label>
                <input type="text" th:field="*{cpf}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Data de Nascimento</label>
                <input type="date" th:field="*{dataNascimento}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Cor da Triagem</label>
                <input type="text" th:field="*{corTriagem}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Data</label>
                <input type="datetime-local" th:field="*{data}" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary">Salvar</button>

        </form>
    </div>
</body>
</html>
